<!DOCTYPE html>
<html>
<head>

<title>Books List</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">

</head>

<body>

<div class="container mt-5">

<h2>Books List</h2>

<table class="table table-bordered">

<thead>

<tr>
<th>ID</th>
<th>Book Name</th>
<th>Author</th>
<th>Category</th>
<th>Quantity</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for book in books %}

<tr>

<td>{{ book[0] }}</td>
<td>{{ book[1] }}</td>
<td>{{ book[2] }}</td>
<td>{{ book[3] }}</td>
<td>{{ book[4] }}</td>


<td>
<a href="/delete_book/{{ book[0] }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
